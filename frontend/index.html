<!DOCTYPE html>
<html>
<head>
    <title>Study Planner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>📚 Study Planner</h1>

    <div class="container">

        <h2>Add Subject</h2>

        <input type="text" id="subject" placeholder="Subject Name">

        <input type="number" id="difficulty" placeholder="Difficulty (1-5)">

        <input type="number" id="days" placeholder="Days Left">

        <button onclick="addTask()">Add Task</button>

        <h2>Study Plan</h2>

        <ul id="taskList"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
